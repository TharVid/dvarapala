# Tool mutation / rug-pull rule pack — Dvarapala's NATIVE detector.
#
# Hashes every tool definition on first sight and alerts if a tool's
# definition (name, description, schema) changes between sessions or
# during a session. Defends against the "rug-pull" class of attacks
# where a benign tool silently mutates after user approval.

pack: tool-mutation
description: Detect tool definitions that change after first sight (rug-pull)
detector: dvarapala-native

rules:
  - name: alert-on-tool-definition-change
    match:
      method: tools/list
      tool_definition_changed: true
    action: deny
    reason: "Tool definition changed since last session — possible rug-pull"
    require_human_approval: true

  - name: alert-on-tool-name-collision
    match:
      method: tools/list
      tool_name_collision_with_known: true
    action: log_only
    reason: "Tool name matches a previously seen tool from a different server"
