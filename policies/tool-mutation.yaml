# Tool mutation / rug-pull rule pack — Dvarapala's NATIVE detector.
#
# Hashes every tool definition on first sight and alerts if a tool's
# definition (name, description, schema) changes between sessions or
# during a session. Defends against the "rug-pull" class of attacks
# where a benign, user-approved tool silently mutates after approval.

pack: tool-mutation
description: Detect tool definitions that change after first sight (rug-pull)
detector: tool-mutation

rules:
  - name: deny-on-tool-definition-change
    match:
      direction: outbound
      content_matches:
        detector: tool-mutation
    action: deny
    reason: "tool definition changed since last session — possible rug-pull"
