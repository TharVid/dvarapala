# Secrets rule pack.
#
# Uses gitleaks (https://github.com/gitleaks/gitleaks) embedded as a Go library.
# 150+ rules covering AWS, GCP, Azure, GitHub, Slack, Stripe, JWT, private keys,
# .env entries, etc. We do NOT maintain our own secret regexes.

pack: secrets
description: Block tool calls and outputs that contain secrets (gitleaks rules)
detector: gitleaks

rules:
  - name: block-secrets-in-tool-args
    match:
      direction: inbound
      content_matches:
        detector: gitleaks
    action: deny
    reason: "Secret found in tool arguments (gitleaks)"

  - name: redact-secrets-in-tool-output
    match:
      direction: outbound
      content_matches:
        detector: gitleaks
    action: redact
    reason: "Secret in tool output redacted (gitleaks)"
