# Dvarapala default policy — sane defaults for any MCP server.
#
# This file is generated by `dvarapala init`. Edit to taste.
# Documentation: https://github.com/tharvid/dvarapala/blob/main/docs/policy-language.md

version: "1"

# Built-in rule packs to enable. Each pack maps to a directory under
# /etc/dvarapala/policies (or ./policies in dev) with named rules.
defaults:
  - rulepack: pii            # uses Microsoft Presidio (sidecar) — no reinvented regex
  - rulepack: secrets        # uses gitleaks rules embedded as Go library
  - rulepack: prompt-injection  # uses llm-guard sidecar + Meta Prompt-Guard
  - rulepack: tool-poisoning    # Dvarapala-native — line-jumping detection
  - rulepack: tool-mutation     # Dvarapala-native — hashes tool defs, alerts on change
  - rulepack: destructive-actions

# Audit settings
audit:
  format: jsonl
  path: ~/.dvarapala/audit.jsonl
  schema: ocsf  # ocsf | ecs | cef

# LLM-as-judge config (used by prompt-injection pack when heuristics are inconclusive)
llm_judge:
  enabled: true
  provider: anthropic        # anthropic | openai | ollama | none
  model: claude-haiku-4-5    # cheap + fast for judging
  cache_ttl: 1h
  threshold: 0.6

# Custom rules — add yours here
rules: []
