# Tool poisoning rule pack — Dvarapala's NATIVE detector.
#
# Detects prompt-injection patterns embedded in MCP tool descriptions.
# This is a class of attack specific to MCP that no off-the-shelf library
# covers. Reference: HiddenLayer & Anthropic published advisories on
# tool-description injection / "line-jumping" attacks against MCP in 2024–2025.
#
# Detection delegates to the in-process tool-poisoning detector
# (internal/detectors/toolpoisoning), which runs hand-curated regexes
# covering "ignore previous instructions", system-tag injection,
# credential-prompt fragments, and DAN-style jailbreaks.

pack: tool-poisoning
description: Detect malicious instructions hidden in MCP tool descriptions
detector: tool-poisoning

rules:
  - name: deny-tool-description-injection
    match:
      direction: outbound
      content_matches:
        detector: tool-poisoning
    action: deny
    reason: "tool description contains prompt-injection pattern"
