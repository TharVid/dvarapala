nfpms:
  - id: dvarapala
    package_name: dvarapala
    vendor: TharVid
    homepage: "https://github.com/tharvid/dvarapala"
    maintainer: "Sunil Kumar <sunil@tharvid.in>"
    description: "MCP security gateway"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: ./policies
        dst: /etc/dvarapala/policies
        type: tree
      - src: ./LICENSE
        dst: /usr/share/doc/dvarapala/LICENSE

release:
  github:
    owner: tharvid
    name: dvarapala
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Dvarapala {{ .Tag }}
    See [CHANGELOG](https://github.com/tharvid/dvarapala/blob/main/CHANGELOG.md) for full notes.
